name: Daily Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run scraper
        env:
          INSPIRED_TOKEN: ${{ secrets.INSPIRED_TOKEN }}
        run: python inspiredinnovatorlist.py

      - name: Commit & Push result
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update data"
          file_pattern: "*.xlsx"
