name: Daily Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests pandas openpyxl

      # 4. Run script
      - name: Run scraper
        run: python inspiredinnovatorlist.py

      # 5. Commit & Push
      - name: Commit & Push result
        run: |
          git config user.name "github-actions-bot"
          git config user.email "bot@github.com"

          git add inspired_data.xlsx

          # commit only if changes exist
          git diff --cached --quiet || git commit -m "🤖 auto update data"

          git push
